<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
    <style>
        .bg { fill: #0d1117; rx: 12px; }
        .title { fill: #58a6ff; font-family: sans-serif; font-size: 20px; font-weight: bold; }
        .text { fill: #c9d1d9; font-family: sans-serif; font-size: 14px; }
        .stat-box { fill: #161b22; rx: 8px; }
    </style>

    <rect width="600" height="300" class="bg" />

    <!-- Dùng biến Jinja2: {{ title }} -->
    <text x="30" y="50" class="title">{{ title }}</text>

    <rect x="30" y="80" width="250" height="180" class="stat-box" />
    <text x="50" y="120" class="text">Du an: {{ project_name }}</text>
    <text x="50" y="150" class="text">Trang thai: {{ status }}</text>

    <rect x="300" y="80" width="270" height="180" class="stat-box" />
    <text x="320" y="120" class="text">Framework: {{ framework }}</text>
    <text x="320" y="150" class="text">He dieu hanh: {{ os_name }} :)</text>
</svg>
